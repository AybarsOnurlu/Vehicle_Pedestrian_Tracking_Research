# ============================================
# Data Augmentation Configuration
# Road-Scene Specific Adversarial Augmentation
# ============================================

# Enable/disable augmentation pipeline
enabled: true

# ---- Adverse Weather Simulation ----
weather:
  # Synthetic fog overlay
  fog:
    enabled: true
    probability: 0.15
    intensity_range: [0.3, 0.7]     # Reduces contrast & saturation
    fog_coeff_range: [0.05, 0.15]

  # Rain streak simulation
  rain:
    enabled: true
    probability: 0.15
    slant_range: [-10, 10]          # Angle of rain streaks (degrees)
    drop_length_range: [5, 15]      # Streak length in pixels
    drop_width: 1
    brightness_coefficient: 0.7

  # Low-sun glare simulation
  glare:
    enabled: true
    probability: 0.10
    exposure_shift_range: [-0.1, 0.1]  # ±10% exposure

# ---- Sensor Degradation Simulation ----
sensor:
  # Motion blur (simulates ego-vehicle movement)
  motion_blur:
    enabled: true
    probability: 0.10
    kernel_size_range: [3, 7]       # Blur kernel size (up to ~1.25px effective)

  # ISO noise (night driving)
  gaussian_noise:
    enabled: true
    probability: 0.10
    var_limit: [10.0, 50.0]        # Noise variance range

  # Low-light simulation
  brightness:
    enabled: true
    probability: 0.15
    brightness_limit: [-0.2, 0.2]

# ---- Geometric Augmentations ----
geometric:
  # Random horizontal flip
  horizontal_flip:
    enabled: true
    probability: 0.5

  # Random scale jitter
  scale:
    enabled: true
    scale_limit: [-0.3, 0.3]
    probability: 0.3

# ---- Occlusion Simulation ----
occlusion:
  # Cutout / Random Erasing
  cutout:
    enabled: true
    probability: 0.15
    num_holes: 3
    max_h_size: 64                  # Max hole height (pixels)
    max_w_size: 64                  # Max hole width (pixels)
    fill_value: 0                   # Black fill
