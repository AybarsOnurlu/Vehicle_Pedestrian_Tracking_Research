# ============================================
# Deployment Configuration
# TensorRT Export & Edge Device Settings
# ============================================

# ---- TensorRT Export Settings ----
tensorrt:
  # Source weights path
  source_weights: models/trained/best.pt
  # Export output path
  export_path: models/exported/best.engine
  # Precision mode: fp32, fp16, int8
  precision: fp16
  # INT8 calibration (only if precision=int8)
  int8_calibration:
    enabled: false
    calibration_images: data/processed/val/images
    num_calibration_batches: 100
  # Workspace memory allocation (GB)
  workspace: 4
  # Input dimensions
  input_shape: [1, 3, 1280, 1280]   # [batch, channels, height, width]
  # Dynamic batch support
  dynamic_batch: false

# ---- OpenVINO Export (Intel) ----
openvino:
  enabled: false
  export_path: models/exported/best_openvino/
  precision: fp16

# ---- Edge Device Profiles ----
edge_profiles:
  jetson_orin_nx:
    power_mode: "25W"               # 15W | 25W
    input_size: 640                  # Reduced for edge
    batch_size: 1
    precision: fp16
    target_fps: 30

  jetson_agx_orin:
    power_mode: "60W"
    input_size: 1280
    batch_size: 1
    precision: fp16
    target_fps: 60

# ---- Streaming Configuration ----
streaming:
  # Input source type: file, rtsp, camera
  source_type: file
  # RTSP settings
  rtsp:
    url: "rtsp://0.0.0.0:8554/stream"
    reconnect_delay: 5              # Seconds between reconnection attempts
  # Camera settings
  camera:
    device_id: 0
    resolution: [1920, 1080]
    fps: 30
  # Output streaming
  output:
    save_video: true
    video_codec: mp4v
    save_json: true
    json_path: outputs/logs/tracking_results.json

# ---- Performance Thresholds ----
sla:
  min_fps: 30                       # Minimum acceptable FPS
  max_latency_ms: 33                # Maximum per-frame latency
  alert_on_drop: true               # Log warning if FPS drops below SLA
