# ============================================
# YOLOv8 Model Configuration
# Vehicle & Pedestrian Tracking Project
# ============================================

# Model architecture selection
# Options: yolov8n, yolov8s, yolov8m, yolov8l, yolov8x
model_variant: yolov8m

# Pretrained weights (MS COCO)
pretrained_weights: models/pretrained/yolov8m.pt

# Training hyperparameters
training:
  epochs: 100
  batch_size: 16
  image_size: 1280                # Input resolution (higher = better small object detection)
  optimizer: AdamW                # AdamW for weight decay regularization
  learning_rate:
    initial: 0.001
    final: 0.01                   # Cosine annealing final LR (lr0 * lrf)
    warmup_epochs: 3              # Linear warmup to prevent early divergence
  weight_decay: 0.0005
  momentum: 0.937

# Loss function tuning
loss:
  box_loss_gain: 7.5              # Box regression loss weight
  cls_loss_gain: 0.5              # Classification loss weight
  dfl_loss_gain: 1.5              # Distribution focal loss weight

# Augmentation (applied during training)
augmentation:
  mosaic: 1.0                     # Mosaic augmentation probability
  mixup: 0.15                     # MixUp augmentation probability
  copy_paste: 0.1                 # Copy-paste augmentation
  hsv_h: 0.015                    # HSV-Hue augmentation range
  hsv_s: 0.7                      # HSV-Saturation augmentation range
  hsv_v: 0.4                      # HSV-Value augmentation range
  degrees: 0.0                    # Rotation range
  translate: 0.1                  # Translation range
  scale: 0.5                      # Scale augmentation range
  flipud: 0.0                     # Vertical flip probability
  fliplr: 0.5                     # Horizontal flip probability

# Inference settings
inference:
  confidence_threshold: 0.45      # Minimum detection confidence
  iou_threshold: 0.6              # NMS IoU threshold
  max_detections: 300             # Maximum detections per frame
  device: "0"                     # GPU device ID (or "cpu")
  half_precision: true            # FP16 inference


